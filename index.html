<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Italy 2026" />
<style>
  :root{
    --sea:#1f6f8b; --sea-d:#155264; --sky:#bfe6fb; --sand:#f6efe2; --ivory:#fbf8f2;
    --terra:#c8643c; --olive:#7e8b55; --pink:#d8417f; --pinkL:#f4d9e6;
    --gold:#b8964a; --ink:#23201b; --muted:#7c756a; --line:#e7ded0; --green:#3b7d4f;
    --card:#ffffff; --shadow:0 6px 22px rgba(31,56,72,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--sand);color:var(--ink);line-height:1.5;
    padding-bottom:84px;padding-top:env(safe-area-inset-top);}
  a{color:var(--sea)}
  .wrap{max-width:680px;margin:0 auto;padding:0 14px}
  /* Header */
  header{background:linear-gradient(135deg,var(--sea),var(--sea-d));color:#fff;
    padding:calc(18px + env(safe-area-inset-top)) 0 16px;border-radius:0 0 22px 22px;box-shadow:var(--shadow)}
  .h-top{display:flex;align-items:center;gap:12px}
  .h-ico{width:46px;height:46px;border-radius:12px;flex:0 0 auto;box-shadow:0 2px 8px rgba(0,0,0,.2);background:#fff}
  .h-title{font-size:20px;font-weight:800;letter-spacing:.2px;margin:0}
  .h-sub{font-size:12.5px;opacity:.9;margin:2px 0 0}
  .status{margin-top:13px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
    border-radius:14px;padding:11px 13px;backdrop-filter:blur(4px)}
  .status .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;opacity:.85}
  .status .now{font-size:15px;font-weight:700;margin-top:2px}
  .status .nxt{font-size:12.5px;opacity:.92;margin-top:4px}
  /* Tabs */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.97);
    border-top:1px solid var(--line);display:flex;overflow-x:auto;padding:6px 6px calc(6px + env(safe-area-inset-bottom));gap:2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{flex:0 0 auto;background:none;border:none;font:inherit;color:var(--muted);
    padding:6px 10px;border-radius:11px;display:flex;flex-direction:column;align-items:center;gap:2px;
    min-width:62px;cursor:pointer;font-size:10.5px;font-weight:600}
  nav.tabs button .ic{font-size:19px;line-height:1}
  nav.tabs button.on{color:var(--sea);background:var(--sky)}
  /* Content */
  main{padding-top:16px}
  section{display:none;animation:fade .25s ease}
  section.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.sec{font-size:20px;margin:4px 0 4px;font-weight:800}
  p.lead{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 3px;font-size:16px}
  .card .meta{color:var(--muted);font-size:13px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin:0 4px 4px 0}
  .pill.sea{background:var(--sky);color:var(--sea-d)} .pill.terra{background:#f6ddd1;color:var(--terra)}
  .pill.pink{background:var(--pinkL);color:var(--pink)} .pill.gold{background:#f0e6cb;color:#8a6d22}
  .pill.green{background:#d9efdf;color:var(--green)} .pill.gray{background:#ece7df;color:var(--muted)}
  .row{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .tag-date{font-size:12px;font-weight:800;color:#fff;background:var(--terra);border-radius:8px;padding:3px 8px;white-space:nowrap}
  .tag-date.sea{background:var(--sea)} .tag-date.pink{background:var(--pink)} .tag-date.olive{background:var(--olive)}
  .maplink{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--sea);
    text-decoration:none;margin-top:8px;background:var(--sky);padding:6px 10px;border-radius:9px}
  .tel{font-weight:700;color:var(--sea);text-decoration:none}
  .sub{font-size:13px;color:var(--ink)}
  .day{cursor:pointer}
  .day .ev{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:none}
  .day.open .ev{display:block}
  .ev .e{display:flex;gap:9px;margin:9px 0}
  .ev .e .t{font-size:11px;font-weight:800;color:var(--muted);min-width:62px;padding-top:1px}
  .ev .e .b{font-size:14px}
  .ev .e .b small{color:var(--muted);font-size:12.5px;display:block}
  .chev{transition:transform .2s;color:var(--muted);font-size:13px}
  .day.open .chev{transform:rotate(90deg)}
  .alert{background:#fff6ed;border:1px solid #f3d8bf;border-left:4px solid var(--terra);border-radius:12px;padding:12px 13px;margin-bottom:11px}
  .alert.red{background:#fdf0f0;border-color:#f2c9c9;border-left-color:#c0392b}
  .alert b{display:block;margin-bottom:2px}
  .alert .small{font-size:12.5px;color:var(--muted)}
  .reveal{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:9px 14px;font:inherit;font-weight:700;font-size:13px;cursor:pointer}
  .hidden-val{font-family:ui-monospace,Menlo,Consolas,monospace;letter-spacing:1px}
  .doc-line{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .doc-line:last-child{border-bottom:none}
  .check{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .check:last-child{border-bottom:none}
  .check .bx{width:20px;height:20px;border:2px solid var(--sea);border-radius:6px;flex:0 0 auto;margin-top:1px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--sea);font-weight:900}
  .check.done .bx{background:var(--sea);color:#fff}
  .check.done .lab{text-decoration:line-through;color:var(--muted)}
  .wc{display:flex;gap:12px;align-items:flex-start}
  .wc .when{background:var(--sea);color:#fff;border-radius:12px;padding:8px 10px;text-align:center;min-width:64px}
  .wc .when .d{font-size:18px;font-weight:800;line-height:1}
  .wc .when .m{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.9}
  .wc .when .ti{font-size:11px;margin-top:3px;font-weight:700}
  .group-h{font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--terra);font-weight:800;margin:18px 0 8px}
  .group-h:first-child{margin-top:4px}
  .mini{font-size:12.5px;color:var(--muted)}
  .foot{text-align:center;color:var(--muted);font-size:12px;padding:18px 0 8px}
  .phrase{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .phrase:last-child{border-bottom:none}
  .phrase .it{font-weight:700}
  .phrase .en{color:var(--muted);font-size:13px;text-align:right}
  .phrase .pr{font-size:11.5px;color:var(--sea);font-style:italic}
  .banner{background:linear-gradient(135deg,#fff,#fef6ee);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .countdown{font-size:13px;font-weight:800;color:var(--terra)}
</style>
</head>

  });
}

function updateStatus(){
  const now=new Date();
  const start=new Date(2026,6,13), end=new Date(2026,6,30,23,59);
  const sN=document.getElementById('statusNow'), sX=document.getElementById('statusNext');
  if(now<start){
    const days=Math.ceil((start-now)/86400000);
    sN.textContent=`${days} day${days!==1?'s':''} until Italy ✈️`;
    sX.textContent="First stop: Rome — Guest House Cavour 278, Monti.";
  } else if(now>end){
    sN.textContent="Buon viaggio — trip complete 🇮🇹";
    sX.textContent="Hope it was magical.";
  } else {
    const idx=Math.floor((now - start)/86400000);
    const d=DAYS[idx];
    if(d){sN.textContent=`Today: ${d.title}`;
      const nx=DAYS[idx+1];
      sX.textContent=nx?`Tomorrow: ${nx.title}`:"Last day — safe travels home.";}
  }
}
function updateCountdown(){
  const cd=document.getElementById('cd'); if(!cd)return;
  const now=new Date(), start=new Date(2026,6,13);
  if(now<start){const days=Math.ceil((start-now)/86400000);cd.textContent=`${days} day${days!==1?'s':''} to go!`;}
  else if(now<=new Date(2026,6,30,23,59)){cd.textContent="You're in Italy right now 🎉";}
  else cd.textContent="Trip complete 🇮🇹";
}

function show(id){
  main.innerHTML='';
  const s=document.createElement('section');s.className='on';s.innerHTML=RENDER[id]();
  main.appendChild(s);
  tabsEl.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.t===id));
  window.scrollTo(0,0);
  // hooks
  if(id==='trip'){s.querySelectorAll('.day').forEach(d=>d.onclick=()=>d.classList.toggle('open'));}
  if(id==='travel'){renderActions(s.querySelector('#actionsCard'));}
  if(id==='today'){renderActions(s.querySelector('#todayActions'));updateCountdown();}
  if(id==='docs'){renderPassports();
    const btn=s.querySelector('#ppBtn'),box=s.querySelector('#ppBox');
    btn.onclick=()=>{const sh=box.dataset.shown==='1';box.dataset.shown=sh?'0':'1';renderPassports();btn.textContent=sh?'👁 Reveal passport numbers':'🙈 Hide numbers';};}
  localStorage.setItem('lastTab',id);
}
